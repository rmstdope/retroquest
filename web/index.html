<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroQuest — The Awakening</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Pyodide runtime -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.27.7/full/pyodide.js"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- App scripts -->
    <script src="js/theme.js"></script>
    <script src="js/bridge.js"></script>
    <script src="js/app.js"></script>
</head>
<body x-data x-init="$store.game.init()">

    <!-- ========== Loading Screen ========== -->
    <div class="loading-screen"
         :class="{ hidden: !$store.game.loading }"
         x-show="$store.game.loading"
         x-transition.opacity>
        <div class="loading-title">RetroQuest</div>
        <div class="loading-spinner"></div>
        <div class="loading-status" x-text="$store.game.loadingStatus"></div>
    </div>

    <!-- ========== Main App (hidden while loading) ========== -->
    <template x-if="!$store.game.loading">
        <div style="display:flex;flex-direction:column;height:100vh">

            <!-- Top Bar -->
            <div class="top-bar">
                <span class="top-bar-title">⚔️ RetroQuest</span>
                <div style="display:flex;align-items:center;gap:8px">
                    <div class="top-bar-actions">
                        <button @click="$store.game.saveGame()">💾 Save</button>
                        <button @click="$store.game.loadGame()">📂 Load</button>
                        <button @click="$store.game.toggleMute()"
                                :title="$store.game.musicMuted ? 'Unmute music' : 'Mute music'"
                                x-text="$store.game.musicMuted ? '🔇' : '🎵'"></button>
                        <button @click="$store.game.submitCommand('help')">❓ Help</button>
                    </div>
                    <button class="hamburger-btn"
                            @click="$store.game.toggleDrawer()"
                            aria-label="Open sidebar">☰</button>
                </div>
            </div>

            <!-- App Layout -->
            <div class="app-layout">

                <!-- Main Content Area -->
                <div class="main-content">

                    <!-- Room Card -->
                    <div class="room-card">
                        <div class="room-name"
                             x-text="$store.game.roomName"></div>
                        <div class="room-description"
                             x-html="RetroTheme.renderMarkup($store.game.roomDescription)">
                        </div>

                        <!-- Characters -->
                        <template x-if="$store.game.characters.length > 0">
                            <div class="entity-section">
                                <div class="entity-label">Characters</div>
                                <div class="chip-row">
                                    <template x-for="char in $store.game.characters"
                                              :key="char">
                                        <button class="chip chip-character"
                                                @click="$store.game.onEntityClick($event, char, 'character')">
                                            👤 <span x-text="char"></span>
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- Items -->
                        <template x-if="$store.game.items.length > 0">
                            <div class="entity-section">
                                <div class="entity-label">Items</div>
                                <div class="chip-row">
                                    <template x-for="item in $store.game.items"
                                              :key="item">
                                        <button class="chip chip-item"
                                                @click="$store.game.onEntityClick($event, item, 'item')">
                                            📦 <span x-text="item"></span>
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- Exits -->
                        <template x-if="Object.keys($store.game.exits).length > 0">
                            <div class="entity-section">
                                <div class="entity-label">Exits</div>
                                <div class="chip-row">
                                    <template x-for="[dir, dest] in Object.entries($store.game.exits)"
                                              :key="dir">
                                        <button class="chip chip-exit"
                                                @click="$store.game.goDirection(dir)">
                                            <span x-text="$store.game.getArrow(dir)"></span>
                                            <span x-text="dir"></span>
                                            <span style="opacity:0.6;font-size:0.8em"
                                                  x-text="'(' + dest + ')'"></span>
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Result Area -->
                    <div class="result-area">
                        <!-- Show intro text first, then command output -->
                        <div class="result-content"
                             x-show="$store.game.lastOutput || $store.game.introText"
                             x-html="$store.game.lastOutput || $store.game.introText">
                        </div>
                    </div>

                    <!-- Quick Action Bar -->
                    <div class="quick-actions">
                        <button class="quick-action-btn"
                                @click="$store.game.submitCommand('look')">
                            👀 Look
                        </button>
                        <button class="quick-action-btn"
                                @click="$store.game.submitCommand('search')">
                            🔍 Search
                        </button>
                        <button class="quick-action-btn"
                                @click="$store.game.submitCommand('inventory')">
                            🎒 Inventory
                        </button>
                        <button class="quick-action-btn"
                                @click="$store.game.submitCommand('spells')">
                            ✨ Spells
                        </button>
                        <button class="quick-action-btn"
                                @click="$store.game.submitCommand('help')">
                            ❓ Help
                        </button>
                    </div>

                    <!-- Input Bar -->
                    <div class="input-bar">
                        <input type="text"
                               x-model="$store.game.commandInput"
                               @keydown.enter="$store.game.submitCommand($store.game.commandInput)"
                               placeholder="Type a command or click on something..."
                               autocomplete="off"
                               autocapitalize="off"
                               spellcheck="false">
                        <button class="send-btn"
                                @click="$store.game.submitCommand($store.game.commandInput)">
                            Send
                        </button>
                    </div>
                </div>

                <!-- Desktop Sidebar -->
                <div class="sidebar">
                    <!-- Active Quests -->
                    <div class="sidebar-section">
                        <div class="sidebar-section-title"
                             @click="$store.game.showActiveQuests = !$store.game.showActiveQuests">
                            📜 Active Quests
                            <span class="toggle-icon"
                                  :class="{ collapsed: !$store.game.showActiveQuests }">▼</span>
                        </div>
                        <template x-if="$store.game.showActiveQuests">
                            <div>
                                <template x-if="$store.game.activeQuests.length === 0">
                                    <div class="sidebar-empty">No active quests</div>
                                </template>
                                <template x-for="quest in $store.game.activeQuests"
                                          :key="quest.name">
                                    <div class="sidebar-item">
                                        <div class="sidebar-item-name"
                                             x-html="RetroTheme.renderMarkup(quest.name)"></div>
                                        <div class="sidebar-item-desc"
                                             x-text="quest.description"></div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Completed Quests -->
                    <div class="sidebar-section">
                        <div class="sidebar-section-title"
                             @click="$store.game.showCompletedQuests = !$store.game.showCompletedQuests">
                            🏆 Completed Quests
                            <span class="toggle-icon"
                                  :class="{ collapsed: !$store.game.showCompletedQuests }">▼</span>
                        </div>
                        <template x-if="$store.game.showCompletedQuests">
                            <div>
                                <template x-if="$store.game.completedQuests.length === 0">
                                    <div class="sidebar-empty">No completed quests</div>
                                </template>
                                <template x-for="quest in $store.game.completedQuests"
                                          :key="quest.name">
                                    <div class="sidebar-item">
                                        <div class="sidebar-item-name"
                                             x-html="RetroTheme.renderMarkup(quest.name)"></div>
                                        <div class="sidebar-item-desc"
                                             x-html="RetroTheme.renderMarkup(quest.description)"></div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Inventory -->
                    <div class="sidebar-section">
                        <div class="sidebar-section-title"
                             @click="$store.game.showInventory = !$store.game.showInventory">
                            🎒 Inventory
                            <span class="toggle-icon"
                                  :class="{ collapsed: !$store.game.showInventory }">▼</span>
                        </div>
                        <template x-if="$store.game.showInventory">
                            <div>
                                <template x-if="$store.game.inventory.length === 0">
                                    <div class="sidebar-empty">Inventory is empty</div>
                                </template>
                                <template x-for="item in $store.game.inventory"
                                          :key="item.name">
                                    <div class="sidebar-item sidebar-clickable"
                                         @click="$store.game.onInventoryClick($event, item.name)">
                                        <div class="sidebar-item-name"
                                             x-html="RetroTheme.renderMarkup(item.name)"></div>
                                        <div class="sidebar-item-desc"
                                             x-text="item.description"></div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Spells -->
                    <div class="sidebar-section">
                        <div class="sidebar-section-title"
                             @click="$store.game.showSpells = !$store.game.showSpells">
                            ✨ Spells
                            <span class="toggle-icon"
                                  :class="{ collapsed: !$store.game.showSpells }">▼</span>
                        </div>
                        <template x-if="$store.game.showSpells">
                            <div>
                                <template x-if="$store.game.spells.length === 0">
                                    <div class="sidebar-empty">No spells known</div>
                                </template>
                                <template x-for="spell in $store.game.spells"
                                          :key="spell.name">
                                    <div class="sidebar-item sidebar-clickable"
                                         @click="$store.game.onSpellClick($event, spell.name)">
                                        <div class="sidebar-item-name"
                                             x-html="RetroTheme.renderMarkup(spell.name)"></div>
                                        <div class="sidebar-item-desc"
                                             x-text="spell.description"></div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- ========== Context Menu (Desktop) ========== -->
    <template x-if="$store.game.showContextMenu">
        <div>
            <div style="position:fixed;inset:0;z-index:99"
                 @click="$store.game.closeMenus()"></div>
            <div class="context-menu"
                 :style="`left:${$store.game.contextMenuX}px;top:${$store.game.contextMenuY}px`"
                 @keydown.escape.window="$store.game.closeMenus()">
                <div class="context-menu-header"
                     x-text="$store.game.contextMenuTarget"></div>
                <template x-for="action in $store.game.contextMenuActions"
                          :key="action.label">
                    <div class="context-menu-item"
                         @click="$store.game.executeAction(action)"
                         x-text="action.label"></div>
                </template>
            </div>
        </div>
    </template>

    <!-- ========== Action Sheet (Mobile) ========== -->
    <template x-if="$store.game.showActionSheet">
        <div class="action-sheet-overlay"
             @click.self="$store.game.closeMenus()">
            <div class="action-sheet">
                <div class="action-sheet-handle"></div>
                <div class="action-sheet-header"
                     x-text="$store.game.actionSheetTarget"></div>
                <template x-for="action in $store.game.actionSheetActions"
                          :key="action.label">
                    <div class="action-sheet-item"
                         @click="$store.game.executeAction(action)"
                         x-text="action.label"></div>
                </template>
                <div class="action-sheet-cancel"
                     @click="$store.game.closeMenus()">Cancel</div>
            </div>
        </div>
    </template>

    <!-- ========== Mobile Drawer ========== -->
    <template x-if="$store.game.showDrawer">
        <div>
            <div class="drawer-scrim"
                 @click="$store.game.showDrawer = false"></div>
            <div class="drawer">
                <div class="drawer-header">
                    <span style="font-weight:700;font-size:1rem">Menu</span>
                    <button class="drawer-close-btn"
                            @click="$store.game.showDrawer = false"
                            aria-label="Close menu">✕</button>
                </div>

                <!-- Active Quests -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">📜 Active Quests</div>
                    <template x-if="$store.game.activeQuests.length === 0">
                        <div class="sidebar-empty">No active quests</div>
                    </template>
                    <template x-for="quest in $store.game.activeQuests"
                              :key="quest.name">
                        <div class="sidebar-item">
                            <div class="sidebar-item-name"
                                 x-html="RetroTheme.renderMarkup(quest.name)"></div>
                            <div class="sidebar-item-desc"
                                 x-text="quest.description"></div>
                        </div>
                    </template>
                </div>

                <!-- Inventory -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">🎒 Inventory</div>
                    <template x-if="$store.game.inventory.length === 0">
                        <div class="sidebar-empty">Inventory is empty</div>
                    </template>
                    <template x-for="item in $store.game.inventory"
                              :key="item.name">
                        <div class="sidebar-item sidebar-clickable"
                             @click="$store.game.onInventoryClick($event, item.name)">
                            <div class="sidebar-item-name"
                                 x-html="RetroTheme.renderMarkup(item.name)"></div>
                            <div class="sidebar-item-desc"
                                 x-text="item.description"></div>
                        </div>
                    </template>
                </div>

                <!-- Spells -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">✨ Spells</div>
                    <template x-if="$store.game.spells.length === 0">
                        <div class="sidebar-empty">No spells known</div>
                    </template>
                    <template x-for="spell in $store.game.spells"
                              :key="spell.name">
                        <div class="sidebar-item sidebar-clickable"
                             @click="$store.game.onSpellClick($event, spell.name)">
                            <div class="sidebar-item-name"
                                 x-html="RetroTheme.renderMarkup(spell.name)"></div>
                            <div class="sidebar-item-desc"
                                 x-text="spell.description"></div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- ========== Quest Modal ========== -->
    <template x-if="$store.game.showModal">
        <div class="modal-overlay"
             @click.self="$store.game.dismissModal()">
            <div class="modal-content">
                <div class="modal-title"
                     x-text="$store.game.modalTitle"></div>
                <div class="modal-body"
                     x-html="$store.game.modalBody"></div>
                <button class="modal-dismiss-btn"
                        @click="$store.game.dismissModal()">
                    Continue
                </button>
                <div style="clear:both"></div>
            </div>
        </div>
    </template>

    <!-- Hidden background music player -->
    <audio id="bg-music" loop></audio>

</body>
</html>
